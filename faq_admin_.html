<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 통합 관리 센터</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #f8f9fa; font-family: 'Malgun Gothic', sans-serif; }
        .login-container { max-width: 400px; margin: 100px auto; }
        .sidebar { min-height: 100vh; background-color: #343a40; color: white; }
        .sidebar a { color: #fff; text-decoration: none; display: block; padding: 15px; }
        .sidebar a:hover, .sidebar a.active { background-color: #495057; }
        .content-area { padding: 30px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loginSection" class="container login-container">
        <div class="card shadow">
            <div class="card-body">
                <h3 class="card-title text-center mb-4">🔐 관리자 인증</h3>
                <div class="mb-3">
                    <label class="form-label">아이디</label>
                    <input type="text" id="username" class="form-content form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">비밀번호</label>
                    <input type="password" id="password" class="form-control">
                </div>
                <button onclick="handleLogin()" class="btn btn-primary w-100">로그인</button>
                <div id="loginError" class="text-danger mt-3 text-center hidden">😕 사용자 아이디 또는 비밀번호가 틀렸습니다.</div>
            </div>
        </div>
    </div>

    <div id="mainDashboard" class="container-fluid hidden">
        <div class="row">
            <nav class="col-md-3 col-lg-2 sidebar d-md-block sidebar-menu">
                <div class="position-sticky pt-3">
                    <h5 class="text-center py-3">🚀 통합 관리 센터</h5>
                    <ul class="nav flex-column">
                        <li class="nav-item"><a href="#" id="menuFaq" onclick="switchMenu('faq')" class="active">❓ FAQ 관리</a></li>
                        <li class="nav-item"><a href="#" id="menuMenu" onclick="switchMenu('menu')">🍔 메뉴 관리</a></li>
                        <li class="nav-item"><a href="#" id="menuNotice" onclick="switchMenu('notice')">📢 공지사항 설정</a></li>
                    </ul>
                    <div class="p-3 mt-5">
                        <button onclick="handleLogout()" class="btn btn-danger w-100">로그아웃</button>
                    </div>
                </div>
            </nav>

            <main class="col-md-9 ms-sm-auto col-lg-10 content-area">
                
                <div id="secFaq" class="menu-section">
                    <h2>❓ FAQ 관리 시스템</h2>
                    <hr>
                    <ul class="nav nav-tabs mb-4" id="faqTabs" role="tablist">
                        <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#newFaqTab" type="button">➕ 새 FAQ 등록</button></li>
                        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#editFaqTab" type="button" onclick="loadFaqList()">📝 기존 FAQ 수정/삭제</button></li>
                    </ul>
                    
                    <div class="tab-content">
                        <div class="tab-pane fade show active" id="newFaqTab">
                            <div class="card p-4">
                                <div class="mb-3"><label class="form-label">질문 내용</label><input type="text" id="addQ" class="form-control"></div>
                                <div class="mb-3"><label class="form-label">답변 내용</label><textarea id="addA" class="form-control" rows="3"></textarea></div>
                                <div class="mb-3">
                                    <label class="form-label">카테고리 선택</label>
                                    <select id="addCat" class="form-select">
                                        <option>💳 카드 / 결제</option><option>🥤 이용방법</option><option>📱 쿠폰 / 바코드</option><option>🎆진행중인 행사</option><option>🗨️기타</option>
                                    </select>
                                </div>
                                <div class="mb-3"><label class="form-label">이미지 첨부 (선택)</label><input type="file" id="addImg" class="form-control" accept="image/*"></div>
                                <button onclick="insertFaq()" class="btn btn-success w-100">DB에 저장하기</button>
                            </div>
                        </div>
                        
                        <div class="tab-pane fade" id="editFaqTab">
                            <div class="card p-4">
                                <div class="mb-3">
                                    <label class="form-label">수정 또는 삭제할 FAQ를 선택하세요</label>
                                    <select id="faqSelect" class="form-select" onchange="onFaqSelectChange()"><option value="">로딩 중...</option></select>
                                </div>
                                <hr>
                                <div id="editFormArea" class="hidden">
                                    <div class="d-flex justify-content-between align-items-center mb-3">
                                        <h5>📝 내용 수정</h5>
                                        <button onclick="deleteFaq()" class="btn btn-danger">🗑️ 이 FAQ 삭제</button>
                                    </div>
                                    <div class="mb-3"><label class="form-label">질문 수정</label><input type="text" id="editQ" class="form-control"></div>
                                    <div class="mb-3"><label class="form-label">답변 수정</label><textarea id="editA" class="form-control" rows="3"></textarea></div>
                                    <div class="mb-3">
                                        <label class="form-label">카테고리 수정</label>
                                        <select id="editCat" class="form-select">
                                            <option>💳 카드 / 결제</option><option>🥤 이용방법</option><option>📱 쿠폰 / 바코드</option><option>🎆진행중인 행사</option><option>🗨️기타</option>
                                        </select>
                                    </div>
                                    <div id="currentImgArea" class="mb-3"></div>
                                    <button onclick="updateFaq()" class="btn btn-primary w-100">💾 변경사항 저장</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="secMenu" class="menu-section hidden">
                    <h2>🍔 상품/메뉴 관리</h2>
                    <div class="alert alert-info">준비 중인 기능입니다. FAQ와 동일한 방식으로 테이블을 연동하세요.</div>
                </div>

                <div id="secNotice" class="menu-section hidden">
                    <h2>📢 키오스크 공지사항</h2>
                    <div class="card p-4">
                        <div class="mb-3"><label class="form-label">공지 내용</label><textarea class="form-control" placeholder="예: 현재 시스템 점검 중입니다."></textarea></div>
                        <button onclick="alert('공지사항이 저장되었습니다!')" class="btn btn-success">설정 저장</button>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // ★ 본인의 Supabase 정보로 채워주세요!
        const SUPABASE_URL = "https://yjtnvcydrrxjoitjqtzg.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlqdG52Y3lkcnJ4am9pdGpxdHpnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MjA1NDAsImV4cCI6MjA5NDE5NjU0MH0.9WXlEv82kg48PmDJudJ_DW0X5C5eqDR771ZXxj8zb6s";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let localFaqList = [];

        // 로그인 로직
        function handleLogin() {
            const u = document.getElementById("username").value;
            const p = document.getElementById("password").value;
            if(u === "admin" && p === "1234") {
                document.getElementById("loginSection").classList.add("hidden");
                document.getElementById("mainDashboard").classList.remove("hidden");
            } else {
                document.getElementById("loginError").classList.remove("hidden");
            }
        }

        function handleLogout() {
            document.getElementById("username").value = "";
            document.getElementById("password").value = "";
            document.getElementById("mainDashboard").classList.add("hidden");
            document.getElementById("loginSection").classList.remove("hidden");
            document.getElementById("loginError").classList.add("hidden");
        }

        // 왼쪽 메뉴 체인저
        function switchMenu(menuType) {
            document.querySelectorAll(".menu-section").forEach(sec => sec.classList.add("hidden"));
            document.querySelectorAll(".sidebar a").forEach(a => a.classList.remove("active"));
            
            if(menuType === 'faq') { document.getElementById("secFaq").classList.remove("hidden"); document.getElementById("menuFaq").classList.add("active"); }
            if(menuType === 'menu') { document.getElementById("secMenu").classList.remove("hidden"); document.getElementById("menuMenu").classList.add("active"); }
            if(menuType === 'notice') { document.getElementById("secNotice").classList.remove("hidden"); document.getElementById("menuNotice").classList.add("active"); }
        }

        // FAQ 저장 (Insert)
        async function insertFaq() {
            const q = document.getElementById("addQ").value;
            const a = document.getElementById("addA").value;
            const cat = document.getElementById("addCat").value;
            const imgFile = document.getElementById("addImg").files[0];
            let imgUrl = null;

            if(!q || !a) return alert("질문과 답변을 입력해주세요.");

            // 이미지 업로드 로직 (선택사항)
            if(imgFile) {
                const fileName = `faq_${Date.now()}.png`;
                const { data, error } = await _supabase.storage.from("images").upload(fileName, imgFile);
                if(!error) {
                    const res = _supabase.storage.from("images").getPublicUrl(fileName);
                    imgUrl = res.data.publicUrl;
                }
            }

            // DB Insert
            const { error } = await _supabase.table("faqs").insert([{ question: q, answer: a, category: cat, image_url: imgUrl }]);
            if(!error) {
                alert("✅ 성공적으로 등록되었습니다!");
                location.reload();
            } else { alert("오류 발생: " + error.message); }
        }

        // FAQ 리스트 불러오기 (Select)
        async function loadFaqList() {
            // ❌ 기존: const { data, error } = await _supabase.table("faqs")...
            // ✅ 변경: 자바스크립트는 .from()을 사용합니다!
            const { data, error } = await _supabase.from("faqs").select("*").order("id", { ascending: false });
            
            if(!error) {
                localFaqList = data;
                const selectEl = document.getElementById("faqSelect");
                selectEl.innerHTML = '<option value="">-- 수정할 항목을 선택하세요 --</option>';
                data.forEach((item, idx) => { 
                    selectEl.innerHTML += `<option value="${idx}">[${item.category || '미지정'}] ${item.question}</option>`; 
                });
            } else {
                console.error("Supabase 에러:", error.message);
            }
}

        // 셀렉트 박스 선택 시 수정 폼에 데이터 바인딩
        function onFaqSelectChange() {
            const idx = document.getElementById("faqSelect").value;
            const area = document.getElementById("editFormArea");
            if(!idx) { area.classList.add("hidden"); return; }

            area.classList.remove("hidden");
            const item = localFaqList[idx];
            document.getElementById("editQ").value = item.question;
            document.getElementById("editA").value = item.answer;
            document.getElementById("editCat").value = item.category || "💳 카드 / 결제";
            
            const imgArea = document.getElementById("currentImgArea");
            imgArea.innerHTML = item.image_url ? `<img src="${item.image_url}" width="200" class="mt-2 rounded">` : '';
        }

        // faq 수정
        async function updateFaq() {
            const idx = document.getElementById("faqSelect").value;
            if(!idx) return alert("수정할 항목을 선택해주세요.");
            const item = localFaqList[idx];
            
            
            
            const { error } = await _supabase.from("faqs").update({
                question: document.getElementById("editQ").value,
                answer: document.getElementById("editA").value,
                category: document.getElementById("editCat").value
            }).eq("id", item.id);
            
            if(!error) { 
                alert("✅ 수정 완료!"); 
                loadFaqList(); 
                document.getElementById("editFormArea").classList.add("hidden"); 
            } else {
                alert("수정 실패: " + error.message);
            }
        }

        // 기존 faq 삭제
        async function deleteFaq() {
            if(!confirm("정말 삭제하시겠습니까?")) return;
            const idx = document.getElementById("faqSelect").value;
            const item = localFaqList[idx];
            
            
            const { error } = await _supabase.from("faqs").delete().eq("id", item.id);
            
            if(!error) { 
                alert("🗑️ 삭제되었습니다."); 
                loadFaqList(); 
                document.getElementById("editFormArea").classList.add("hidden"); 
            } else {
                alert("삭제 실패: " + error.message);
            }
        }
    </script>
</body>
</html>
